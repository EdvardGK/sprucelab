[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts =
    -ra
    --strict-markers
    --tb=short
    -p no:cacheprovider
markers =
    e2e: end-to-end tests that boot a FastAPI subprocess and hit real HTTP
    slow: tests that take more than ~5 seconds
filterwarnings =
    ignore::DeprecationWarning
pythonpath = backend
